<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="g" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#7209b7"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outer Hexagon (Cyan glow) -->
  <polygon
    points="50,10 82,28 82,72 50,90 18,72 18,28"
    fill="none"
    stroke="url(#gc)"
    stroke-width="4.5"
    filter="url(#g)"
  />

  <!-- Inner Hexagon (Purple) -->
  <polygon
    points="50,28 66,37 66,63 50,72 34,63 34,37"
    fill="none"
    stroke="url(#gp)"
    stroke-width="3"
  />

  <!-- Connector spokes -->
  <line x1="50" y1="10" x2="50" y2="28" stroke="#00f2fe" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="72" x2="34" y2="63" stroke="#9d4edd" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="72" x2="66" y2="63" stroke="#00f2fe" stroke-width="3" stroke-linecap="round"/>

  <!-- Center glowing core -->
  <circle cx="50" cy="50" r="7" fill="white" filter="url(#g)"/>
  <circle cx="50" cy="50" r="4" fill="white"/>
</svg>